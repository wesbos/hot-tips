<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Jelly slider</title>
  </head>
  <body>
    <style>
      :root {
        color-scheme: light dark;
      }
      #slider {
        cursor: grab;
        width: 75%;
        height: 12.5%;
        opacity: 0;
        --jelly-color: rgb(255, 115, 19);
        --ground-color: rgb(255, 255, 255);
        --text-color: rgb(40, 40, 40);
        color: var(--jelly-color);
        background-color: var(--ground-color);
        caret-color: var(--text-color);
      }
      #slider:focus {
        --jelly-color: rgb(51, 153, 255);
      }
      @media (prefers-color-scheme: dark) {
        #slider {
          --ground-color: rgb(26, 26, 26);
          --text-color: rgb(204, 204, 204);
        }
      }
      @media (prefers-contrast: more) {
        #slider {
          --jelly-color: rgb(255, 51, 0);
          --text-color: rgb(0, 0, 0);
        }
        #slider:focus {
          --jelly-color: rgb(0, 0, 255);
        }
        @media (prefers-color-scheme: dark) {
          #slider {
            --text-color: rgb(255, 255, 255);
          }
        }
      }
      @media (forced-colors: active) {
        #slider {
          --jelly-color: transparent;
          --ground-color: Canvas;
          --text-color: CanvasText;
        }
        #slider:focus {
          --jelly-color: Highlight;
        }
      }
      #value {
        text-align: right;
        height: 12.5%;
        width: 75%;
        color: white;
        font-size: 5vmin;
        line-height: 10vmin;
        font-family: sans-serif;
      }
    </style>

    <canvas layoutsubtree>
      <input id="slider" type="range" min="0" max="100" step="1" value="100" />
      <div id="value" inert="true"></div>
    </canvas>
    <div id="attribution">
      This is based on Software Mansion's
      <a
        href="https://github.com/software-mansion/TypeGPU/tree/main/apps/typegpu-docs/src/examples/rendering/jelly-slider"
        target="_blank"
      >
        Jelly Slider
      </a>
      , which was inspired by the work of
      <a href="https://x.com/cerpow/status/1964953851603358112" target="_blank">Voicu Apostol</a>.
    </div>

    <script type="module" src="./index.ts"></script>
  </body>
</html>
