<style>

  /* —— LINK-style variants —— */

  /* —— Mint design mat + accent (inspo: drafting / swash pill) —— */

  /* —— Magenta pill + dot (inspo: LINK 07) —— */

  .btn-pill-dot::before {

  /* —— Split buttons: label + price / badge (rounded shell + inner chip) —— */
  .btn-split-buy,

  .btn-split-buy,

  .btn-split-sub {

  .btn-split-cart {

  }

  .btn-split-buy .btn-split__label,
  .btn-split-sub .btn-split__label,
  .btn-split-cart .btn-split__label,
  .btn-split-pro .btn-split__label,
  .btn-split-free .btn-split__label {

  .btn-split-buy .btn-split__price,
  .btn-split-sub .btn-split__price,
  .btn-split-cart .btn-split__price,

  .btn-split-free .btn-split__price {

  }

  .btn-split-buy {
    background: linear-gradient(180deg, #3b82f6 0%, #1d4ed8 100%);

  }

  .btn-split-buy .btn-split__price {

  }

  .btn-split-sub {
    background: linear-gradient(180deg, #7c3aed 0%, #5b21b6 100%);

  }

  .btn-split-sub .btn-split__price {
    background: linear-gradient(180deg, #a7f3d0 0%, #34d399 100%);
    color: #064e3b;
  }

  .btn-split-cart {
    background: linear-gradient(180deg, #059669 0%, #047857 100%);
    color: #ecfdf5;
  }

  .btn-split-cart .btn-split__price {
    background: #f0fdf4;
    color: #065f46;
    font-size: 15px;
    border: 1px solid rgba(6, 95, 70, 0.15);
  }

  .btn-split-pro {
    background: linear-gradient(180deg, #334155 0%, #0f172a 100%);
    color: #f1f5f9;
    border: 1px solid rgb(148 163 184 / 35%);
  }

  .btn-split-pro .btn-split__price {
    background: linear-gradient(180deg, #c4b5fd 0%, #7c3aed 100%);
    color: #fff;
    font-size: 12px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    padding: 10px 12px;
    border-radius: 10px;
  }

  .btn-split-free {
    background: linear-gradient(180deg, #0d9488 0%, #0f766e 100%);
    color: #f0fdfa;
  }

  .btn-split-free .btn-split__price {
    background: linear-gradient(180deg, #fef9c3 0%, #fde047 100%);
    color: #713f12;
    font-size: 13px;
    font-weight: 800;
  }
</style>

<div class="gallery" id="ripple-gallery"></div>

<script>
  const MESH_COLS = 12;
  const MESH_ROWS = 8;

  function drawTexturedTriangle(ctx, img, sx0, sy0, sx1, sy1, sx2, sy2, dx0, dy0, dx1, dy1, dx2, dy2) {
    const u1 = sx1 - sx0,
      v1 = sy1 - sy0;
    const u2 = sx2 - sx0,
      v2 = sy2 - sy0;
    const det = u1 * v2 - v1 * u2;
    if (Math.abs(det) < 0.01) return;

    const p1 = dx1 - dx0,
      q1 = dy1 - dy0;
    const p2 = dx2 - dx0,
      q2 = dy2 - dy0;

    ctx.save();
    ctx.beginPath();
    ctx.moveTo(dx0, dy0);
    ctx.lineTo(dx1, dy1);
    ctx.lineTo(dx2, dy2);
    ctx.closePath();
    ctx.clip();
    ctx.setTransform(
      (p1 * v2 - p2 * v1) / det,
      (q1 * v2 - q2 * v1) / det,
      (u1 * p2 - u2 * p1) / det,
      (u1 * q2 - u2 * q1) / det,
      dx0 - ((p1 * v2 - p2 * v1) * sx0 + (u1 * p2 - u2 * p1) * sy0) / det,
      dy0 - ((q1 * v2 - q2 * v1) * sx0 + (u1 * q2 - u2 * q1) * sy0) / det
    );
    ctx.drawImage(img, 0, 0);
    ctx.restore();
  }

  class MeshButton {
    constructor(container, def, { padX = 10, padY = 10 } = {}) {
      const { label, cls, html } = def;
      this.padX = padX;
      this.padY = padY;

      this.canvas = document.createElement("canvas");
      this.canvas.setAttribute("layoutsubtree", "");

      this.btn = document.createElement("button");
      this.btn.type = "button";
      this.btn.className = `btn btn-${cls}`;
      if (html != null) {
        this.btn.innerHTML = html;
      } else {
        this.btn.textContent = label ?? "";
      }
      this.canvas.appendChild(this.btn);
      container.appendChild(this.canvas);

      this.ctx = this.canvas.getContext("2d");
      this.source = document.createElement("canvas");
      this.sourceCtx = this.source.getContext("2d");

      this.points = [];
      this.btnW = 0;
      this.btnH = 0;
      this.offsetX = 0;
      this.offsetY = 0;

      this.canvas.onpaint = () => this.paint();
      this.autoSize();

      new ResizeObserver(([entry]) => {
        const box = entry.devicePixelContentBoxSize[0];
        this.setSize(box.inlineSize, box.blockSize);
      }).observe(this.canvas, { box: "device-pixel-content-box" });
    }

    autoSize() {
      requestAnimationFrame(() => {
        const bw = this.btn.offsetWidth;
        const bh = this.btn.offsetHeight;
        this.canvas.style.width = `${bw + this.padX * 2}px`;
        this.canvas.style.height = `${bh + this.padY * 2}px`;
      });
    }

    setSize(w, h) {
      this.canvas.width = w;
      this.canvas.height = h;
      this.source.width = w;
      this.source.height = h;
      this.buildMesh();
    }

    buildMesh() {
      const bw = this.btn.offsetWidth * devicePixelRatio;
      const bh = this.btn.offsetHeight * devicePixelRatio;
      this.offsetX = (this.canvas.width - bw) / 2;
      this.offsetY = (this.canvas.height - bh) / 2;
      this.btnW = bw;
      this.btnH = bh;

      this.points = [];
      for (let j = 0; j <= MESH_ROWS; j++) {
        for (let i = 0; i <= MESH_COLS; i++) {
          const rx = this.offsetX + (i / MESH_COLS) * bw;
          const ry = this.offsetY + (j / MESH_ROWS) * bh;
          this.points.push({
            x: rx,
            y: ry,
            restX: rx,
            restY: ry,
            px: rx,
            py: ry,
            vx: 0,
            vy: 0,
            pinX: null,
            pinY: null,
            constraints: [],
          });
        }
      }
      this.onMeshBuilt();
    }

    onMeshBuilt() {}

    paint() {
      if (this.points.length === 0) return;
      const ctx = this.ctx;
      ctx.reset();
      ctx.clearRect(0, 0, this.canvas.width, this.canvas.height);

      try {
        const transform = ctx.drawElementImage(this.btn, this.offsetX, this.offsetY);
        this.btn.style.transform = transform.toString();
      } catch {
        return;
      }

      this.sourceCtx.reset();
      this.sourceCtx.clearRect(0, 0, this.source.width, this.source.height);
      this.sourceCtx.drawImage(this.canvas, 0, 0);

      ctx.clearRect(0, 0, this.canvas.width, this.canvas.height);
      this.renderMesh();
    }

    renderMesh() {
      const ctx = this.ctx;
      const w = MESH_COLS + 1;
      for (let j = 0; j < MESH_ROWS; j++) {
        for (let i = 0; i < MESH_COLS; i++) {
          const p00 = this.points[j * w + i];
          const p10 = this.points[j * w + i + 1];
          const p01 = this.points[(j + 1) * w + i];
          const p11 = this.points[(j + 1) * w + i + 1];

          const sx0 = this.offsetX + (i / MESH_COLS) * this.btnW;
          const sy0 = this.offsetY + (j / MESH_ROWS) * this.btnH;
          const sx1 = this.offsetX + ((i + 1) / MESH_COLS) * this.btnW;
          const sy1 = this.offsetY + ((j + 1) / MESH_ROWS) * this.btnH;

          drawTexturedTriangle(
            ctx,
            this.source,
            sx0,
            sy0,
            sx1,
            sy0,
            sx0,
            sy1,
            p00.x,
            p00.y,
            p10.x,
            p10.y,
            p01.x,
            p01.y
          );
          drawTexturedTriangle(
            ctx,
            this.source,
            sx1,
            sy0,
            sx1,
            sy1,
            sx0,
            sy1,
            p10.x,
            p10.y,
            p11.x,
            p11.y,
            p01.x,
            p01.y
          );
        }
      }
    }

    toCanvasPoint(clientX, clientY) {
      const rect = this.canvas.getBoundingClientRect();
      return {
        x: (clientX - rect.left) * devicePixelRatio,
        y: (clientY - rect.top) * devicePixelRatio,
      };
    }

    update(delta) {}

    reset() {
      this.buildMesh();
    }
  }

  class RippleButton extends MeshButton {
    constructor(container, def) {
      super(container, def, { padX: 12, padY: 12 });
      this.ripples = [];

      this.canvas.addEventListener("pointerdown", (e) => {
        const p = this.toCanvasPoint(e.clientX, e.clientY);
        this.ripples.push({ cx: p.x, cy: p.y, time: 0 });
      });
    }

    update(delta) {
      for (let i = this.ripples.length - 1; i >= 0; i--) {
        this.ripples[i].time += delta;
        if (this.ripples[i].time > 2) this.ripples.splice(i, 1);
      }

      const amp = 6 * devicePixelRatio;
      const speed = 300 * devicePixelRatio;
      const freq = 0.04 / devicePixelRatio;

      for (const p of this.points) {
        p.x = p.restX;
        p.y = p.restY;
        for (const r of this.ripples) {
          const dx = p.restX - r.cx,
            dy = p.restY - r.cy;
          const dist = Math.hypot(dx, dy) || 1;
          const wave = dist - speed * r.time;
          const envelope = amp * Math.exp(-r.time * 2.5) * Math.exp(-Math.abs(wave) * 0.008);
          const disp = envelope * Math.sin(wave * freq * Math.PI * 2);
          p.x += (dx / dist) * disp;
          p.y += (dy / dist) * disp;
        }
      }
    }
  }

  const allInstances = [];

  const defs = [
    { label: "Upload", cls: "blue" },
    { label: "Export", cls: "outline" },
    // { label: "Star", cls: "emerald" },
    // { label: "Sign up", cls: "brutal-magenta" },
    // { label: "Login", cls: "brutal-violet" },
    // { label: "Play", cls: "brutal-teal" },
    // { label: "Shop now", cls: "gloss-orange" },
    // { label: "Download", cls: "gloss-cyan" },
    // { label: "Link 01", cls: "link-solid" },
    // { label: "Link 02", cls: "link-ghost" },
    { label: "Gradient", cls: "sunset" },
    { label: "Buy now", cls: "mint-pill" },
    { label: "Toggle", cls: "pill-dot" },
    {
      cls: "split-buy",
      html: '<span class="btn-split__label">Buy now</span><span class="btn-split__price">$49</span>',
    },
    {
      cls: "split-sub",
      html: '<span class="btn-split__label">Subscribe</span><span class="btn-split__price">$12/mo</span>',
    },
    {
      cls: "split-cart",
      html: '<span class="btn-split__label">Add to cart</span><span class="btn-split__price">$24.00</span>',
    },
    {
      cls: "split-pro",
      html: '<span class="btn-split__label">Upgrade</span><span class="btn-split__price">Pro</span>',
    },
    {
      cls: "split-free",
      html: '<span class="btn-split__label">Start free trial</span><span class="btn-split__price">14 days</span>',
    },
  ];

  const gallery = document.getElementById("ripple-gallery");
  for (const def of defs) {
    allInstances.push(new RippleButton(gallery, def));
  }

  function tick() {
    for (const inst of allInstances) {
      inst.update(0.016);
      inst.canvas.requestPaint();
    }
    requestAnimationFrame(tick);
  }
  tick();
</script>
