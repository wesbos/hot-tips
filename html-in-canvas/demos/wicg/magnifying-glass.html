<!doctype html>
<meta charset="utf-8" />
<title>Magnifying glass website demo</title>

<style>
  :root {
    color-scheme: dark;
  }

  body {
    margin: 0;
    padding: 20px;
    min-height: 100vh;
    display: grid;
    place-items: center;
    background: radial-gradient(circle at 20% 10%, #1d4ed8 0%, #0f172a 45%, #020617 100%);
    font-family:
      Inter,
      system-ui,
      -apple-system,
      Segoe UI,
      Roboto,
      sans-serif;
  }

  canvas {
    width: min(1000px, 94vw);
    aspect-ratio: 16 / 10;
    border-radius: 16px;
    border: 1px solid rgb(148 163 184 / 35%);
    box-shadow:
      0 30px 80px rgb(0 0 0 / 45%),
      inset 0 0 0 1px rgb(255 255 255 / 6%);
    overflow: clip;
    cursor: none;
  }

  #draw_element {
    width: 100%;
    height: 100%;
    box-sizing: border-box;
    display: grid;
    grid-template-rows: auto auto 1fr;
    gap: 12px;
    padding: clamp(14px, 2vw, 24px);
    background:
      radial-gradient(circle at 90% 10%, rgb(6 182 212 / 22%), transparent 32%),
      radial-gradient(circle at 12% 80%, rgb(59 130 246 / 18%), transparent 28%),
      linear-gradient(180deg, #0f172a, #0b1224 36%, #0a1020 100%);
    color: #e2e8f0;
  }

  .topbar {
    display: flex;
    gap: 8px;
  }
  .dot {
    width: 10px;
    height: 10px;
    border-radius: 999px;
    background: #64748b;
  }
  .dot:first-child {
    background: #f87171;
  }
  .dot:nth-child(2) {
    background: #fbbf24;
  }
  .dot:nth-child(3) {
    background: #4ade80;
  }

  .hero {
    display: grid;
    gap: 8px;
  }
  h1 {
    margin: 0;
    letter-spacing: -0.03em;
    font-size: clamp(26px, 3.8vw, 46px);
    line-height: 1.05;
  }
  p {
    margin: 0;
    max-width: 62ch;
    color: #cbd5e1;
  }

  .cards {
    display: grid;
    grid-template-columns: repeat(3, minmax(0, 1fr));
    gap: 10px;
    align-content: start;
  }
  .card {
    border: 1px solid rgb(148 163 184 / 28%);
    background: rgb(15 23 42 / 70%);
    border-radius: 12px;
    padding: 10px;
    display: grid;
    gap: 8px;
  }
  .line {
    height: 10px;
    border-radius: 999px;
    background: linear-gradient(90deg, rgb(148 163 184 / 35%), rgb(148 163 184 / 12%));
  }
  .line.wide {
    width: 85%;
  }
  .line.mid {
    width: 60%;
  }

  .contact {
    margin-top: 6px;
    display: grid;
    gap: 10px;
    padding: 12px;
    border-radius: 12px;
    border: 1px solid rgb(148 163 184 / 30%);
    background: rgb(15 23 42 / 68%);
  }

  .contact h2 {
    margin: 0;
    font-size: 16px;
    letter-spacing: -0.01em;
  }

  .form-grid {
    display: grid;
    grid-template-columns: repeat(2, minmax(0, 1fr));
    gap: 10px;
  }

  .field {
    display: grid;
    gap: 4px;
  }

  .field.full {
    grid-column: 1 / -1;
  }

  .field label {
    font-size: 12px;
    color: #cbd5e1;
  }

  .field input,
  .field select,
  .field textarea {
    width: 100%;
    box-sizing: border-box;
    border-radius: 8px;
    border: 1px solid rgb(148 163 184 / 35%);
    background: rgb(2 6 23 / 72%);
    color: #e2e8f0;
    padding: 8px 10px;
    font: inherit;
  }

  .field textarea {
    min-height: 80px;
    resize: none;
  }

  .actions {
    display: flex;
    justify-content: flex-end;
  }

  .actions button {
    border: 1px solid rgb(96 165 250 / 70%);
    background: linear-gradient(180deg, rgb(59 130 246 / 85%), rgb(37 99 235 / 85%));
    color: #eff6ff;
    border-radius: 8px;
    padding: 8px 12px;
    font-weight: 600;
  }
</style>

<canvas id="canvas" layoutsubtree>
  <div id="draw_element">
    <div class="topbar">
      <div class="dot"></div>
      <div class="dot"></div>
      <div class="dot"></div>
    </div>

    <div class="hero">
      <h1>Website Magnifier</h1>
      <p>
        Move your cursor to inspect this "page" through a glass lens. The magnifying circle scales
        content and applies subtle strip-based warping.
      </p>
    </div>

    <div class="cards">
      <article class="card">
        <div class="line wide"></div>
        <div class="line"></div>
        <div class="line mid"></div>
      </article>
      <article class="card">
        <div class="line wide"></div>
        <div class="line"></div>
        <div class="line mid"></div>
      </article>
      <article class="card">
        <div class="line wide"></div>
        <div class="line"></div>
        <div class="line mid"></div>
      </article>
    </div>

    <form class="contact" action="#">
      <h2>Contact us</h2>
      <div class="form-grid">
        <div class="field">
          <label for="name">Name</label>
          <input id="name" type="text" placeholder="Jane Doe" />
        </div>
        <div class="field">
          <label for="email">Email</label>
          <input id="email" type="email" placeholder="jane@example.com" />
        </div>
        <div class="field">
          <label for="topic">Topic</label>
          <select id="topic">
            <option>Product question</option>
            <option>Pricing</option>
            <option>Support</option>
            <option>Partnership</option>
          </select>
        </div>
        <div class="field">
          <label for="company">Company</label>
          <input id="company" type="text" placeholder="Acme Inc." />
        </div>
        <div class="field full">
          <label for="message">Message</label>
          <textarea id="message" placeholder="Tell us a little about your project."></textarea>
        </div>
      </div>
      <div class="actions">
        <button type="submit">Send message</button>
      </div>
    </form>
  </div>
</canvas>

<script>
  const canvas = document.getElementById("canvas");
  const ctx = canvas.getContext("2d");
  const sharpLayer = document.createElement("canvas");
  const sharpCtx = sharpLayer.getContext("2d");

  const lensRadiusCss = 200;
  const lensZoom = 5;

  let pointerX = 0;
  let pointerY = 0;
  let hasPointer = false;

  function toCanvasPoint(clientX, clientY) {
    const rect = canvas.getBoundingClientRect();
    return {
      x: (clientX - rect.left) * devicePixelRatio,
      y: (clientY - rect.top) * devicePixelRatio,
    };
  }

  function setBackingSize(width, height) {
    canvas.width = width;
    canvas.height = height;
    sharpLayer.width = width;
    sharpLayer.height = height;
    pointerX = width * 0.5;
    pointerY = height * 0.5;
    canvas.requestPaint();
  }

  function drawLens() {
    const r = lensRadiusCss * devicePixelRatio;
    const time = performance.now() * 0.001;

    const drawZoomedSample = (zoom, offsetX, offsetY, alpha = 1) => {
      const destSize = r * 2;
      const srcSize = destSize / zoom;
      const srcX = pointerX - srcSize / 2 + offsetX;
      const srcY = pointerY - srcSize / 2 + offsetY;
      const destX = pointerX - r;
      const destY = pointerY - r;
      ctx.globalAlpha = alpha;
      ctx.drawImage(sharpLayer, srcX, srcY, srcSize, srcSize, destX, destY, destSize, destSize);
    };

    ctx.save();
    ctx.beginPath();
    ctx.arc(pointerX, pointerY, r, 0, Math.PI * 2);
    ctx.clip();

    // Primary magnification pass.
    drawZoomedSample(lensZoom, 0, 0, 1);

    // Layer subtle refractive offsets to imitate curved glass.
    drawZoomedSample(
      lensZoom * 1.06,
      Math.sin(time * 1.8) * 2.2 * devicePixelRatio,
      Math.cos(time * 1.2) * 1.6 * devicePixelRatio,
      0.18,
    );
    drawZoomedSample(
      lensZoom * 0.95,
      -Math.cos(time * 1.4) * 1.8 * devicePixelRatio,
      Math.sin(time * 1.6) * 1.2 * devicePixelRatio,
      0.14,
    );

    // Inner bulge adds stronger center magnification.
    ctx.save();
    ctx.beginPath();
    ctx.arc(pointerX, pointerY, r * 0.62, 0, Math.PI * 2);
    ctx.clip();
    drawZoomedSample(lensZoom * 1.16, 0, 0, 0.26);
    ctx.restore();
    ctx.globalAlpha = 1;

    const ring = ctx.createRadialGradient(pointerX, pointerY, r * 0.82, pointerX, pointerY, r);
    ring.addColorStop(0, "rgba(255,255,255,0)");
    ring.addColorStop(1, "rgba(255,255,255,0.35)");
    ctx.lineWidth = 2 * devicePixelRatio;
    ctx.strokeStyle = ring;
    ctx.beginPath();
    ctx.arc(pointerX, pointerY, r - devicePixelRatio, 0, Math.PI * 2);
    ctx.stroke();

    const glare = ctx.createRadialGradient(
      pointerX - r * 0.32,
      pointerY - r * 0.36,
      0,
      pointerX - r * 0.32,
      pointerY - r * 0.36,
      r * 0.7,
    );
    glare.addColorStop(0, "rgba(255,255,255,0.20)");
    glare.addColorStop(1, "rgba(255,255,255,0)");
    ctx.fillStyle = glare;
    ctx.beginPath();
    ctx.arc(pointerX, pointerY, r, 0, Math.PI * 2);
    ctx.fill();

    ctx.restore();
  }

  function onPointerMove(event) {
    const p = toCanvasPoint(event.clientX, event.clientY);
    pointerX = p.x;
    pointerY = p.y;
    hasPointer = true;
    canvas.requestPaint();
  }

  canvas.addEventListener("pointerenter", onPointerMove);
  canvas.addEventListener("pointermove", onPointerMove);
  canvas.addEventListener("pointerdown", (event) => {
    canvas.setPointerCapture(event.pointerId);
    onPointerMove(event);
  });
  canvas.addEventListener("pointerleave", () => {
    hasPointer = false;
    canvas.requestPaint();
  });

  canvas.onpaint = () => {
    ctx.reset();
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    const sourceElement = canvas.firstElementChild;
    if (!(sourceElement instanceof HTMLElement) || sourceElement.parentElement !== canvas) return;
    const syncTransform = ctx.drawElementImage(sourceElement, 0, 0, canvas.width, canvas.height);
    sourceElement.style.transform = syncTransform.toString();

    sharpCtx.reset();
    sharpCtx.clearRect(0, 0, sharpLayer.width, sharpLayer.height);
    sharpCtx.drawImage(canvas, 0, 0);

    ctx.drawImage(sharpLayer, 0, 0);
    if (hasPointer) drawLens();
  };

  new ResizeObserver(([entry]) => {
    const box = entry.devicePixelContentBoxSize[0];
    setBackingSize(box.inlineSize, box.blockSize);
  }).observe(canvas, { box: "device-pixel-content-box" });
</script>
