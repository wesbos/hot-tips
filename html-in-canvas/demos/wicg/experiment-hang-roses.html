<!DOCTYPE html>
<meta charset="utf-8" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet" />

<style>
  :root { color-scheme: light; }
  * { box-sizing: border-box; }

  body {
    margin: 0;
    min-height: 100vh;
    display: grid;
    grid-template-columns: 1fr;
    grid-template-rows: 1fr;
    background: #fff;
    font-family: "DM Sans", system-ui, sans-serif;
  }

  canvas {
    display: block;
    width: 100vw;
    height: 100vh;
    grid-area: 1 / 1;
    cursor: crosshair;
  }

  #content {
    width: 100%;
    height: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 0;
    background: #fff;
    padding: 24px;
  }

  #content span {
    font-family: "Archivo Black", system-ui, sans-serif;
    font-weight: 400;
    color: #000;
    line-height: 0.92;
    letter-spacing: -0.03em;
    text-transform: uppercase;
    text-align: center;
    display: block;
    white-space: nowrap;
  }

  #panel {
    grid-area: 1 / 1;
    align-self: start;
    justify-self: end;
    margin: 12px;
    width: 220px;
    background: rgba(255,255,255,0.92);
    backdrop-filter: blur(12px);
    border: 1px solid #e2e8f0;
    border-radius: 12px;
    padding: 12px 14px;
    display: flex;
    flex-direction: column;
    gap: 10px;
    z-index: 10;
    font-size: 11px;
    color: #334155;
    user-select: none;
  }

  .panel-row {
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .panel-row label {
    width: 62px;
    flex-shrink: 0;
    font-weight: 500;
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.04em;
    color: #64748b;
  }

  .panel-row input[type="range"] {
    flex: 1;
    height: 4px;
    accent-color: #334155;
  }

  .panel-row .val {
    width: 30px;
    text-align: right;
    font-variant-numeric: tabular-nums;
    font-size: 10px;
    color: #94a3b8;
  }

  .panel-section {
    font-size: 10px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: #94a3b8;
    padding-top: 4px;
    border-top: 1px solid #f1f5f9;
  }

  .dir-wrap {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .dir-ring {
    position: relative;
    width: 56px;
    height: 56px;
    flex-shrink: 0;
  }

  .dir-ring canvas {
    width: 56px;
    height: 56px;
    border-radius: 50%;
    border: 1px solid #cbd5e1;
    cursor: pointer;
  }

  .dir-fields {
    display: flex;
    flex-direction: column;
    gap: 4px;
    flex: 1;
  }

  .dir-fields .panel-row label { width: 42px; }

  .btn-reset {
    padding: 5px 0;
    border: 1px solid #e2e8f0;
    border-radius: 6px;
    background: transparent;
    font: inherit;
    font-size: 10px;
    font-weight: 600;
    color: #64748b;
    cursor: pointer;
    text-align: center;
  }

  .btn-reset:hover { background: #f8fafc; }

  .mode-toggle {
    display: flex;
    border-radius: 8px;
    overflow: hidden;
    border: 1px solid #e2e8f0;
  }

  .mode-toggle button {
    flex: 1;
    padding: 6px 0;
    border: none;
    background: transparent;
    font: inherit;
    font-size: 11px;
    font-weight: 600;
    color: #94a3b8;
    cursor: pointer;
  }

  .mode-toggle button.active {
    background: #1e293b;
    color: #fff;
  }
</style>

<canvas layoutsubtree>
  <div id="content">
    <span>No matter how long</span>
    <span>I lie here under water</span>
    <span>Something feels wrong</span>
    <span>And oh, hang me like roses</span>
    <span>You can have something pretty</span>
    <span>When I'm dried out and dead</span>
  </div>
</canvas>

<div id="panel">
  <div class="mode-toggle">
    <button id="btn-edit" class="active" type="button">Edit</button>
    <button id="btn-view" type="button">View</button>
  </div>

  <div class="panel-section">Brush</div>
  <div class="panel-row">
    <label>Size</label>
    <input type="range" id="s-size" min="40" max="500" value="220" />
    <span class="val" id="v-size">220</span>
  </div>
  <div class="panel-row">
    <label>Width</label>
    <input type="range" id="s-width" min="40" max="500" value="220" />
    <span class="val" id="v-width">220</span>
  </div>
  <div class="panel-row">
    <label>Height</label>
    <input type="range" id="s-height" min="40" max="500" value="220" />
    <span class="val" id="v-height">220</span>
  </div>

  <div class="panel-section">Noise</div>
  <div class="panel-row">
    <label>Spread</label>
    <input type="range" id="s-spread" min="5" max="120" value="60" />
    <span class="val" id="v-spread">60</span>
  </div>
  <div class="panel-row">
    <label>Grain</label>
    <input type="range" id="s-grain" min="1" max="8" value="1.5" step="0.5" />
    <span class="val" id="v-grain">1.5</span>
  </div>
  <div class="panel-row">
    <label>Samples</label>
    <input type="range" id="s-samples" min="2" max="12" value="6" step="1" />
    <span class="val" id="v-samples">6</span>
  </div>

  <div class="panel-section">Direction</div>
  <div class="dir-wrap">
    <div class="dir-ring">
      <canvas id="dir-canvas" width="112" height="112"></canvas>
    </div>
    <div class="dir-fields">
      <div class="panel-row">
        <label>Angle</label>
        <input type="range" id="s-angle" min="0" max="360" value="0" />
        <span class="val" id="v-angle">0°</span>
      </div>
      <div class="panel-row">
        <label>Bias</label>
        <input type="range" id="s-bias" min="0" max="500" value="0" />
        <span class="val" id="v-bias">0%</span>
      </div>
    </div>
  </div>

  <div class="panel-row">
    <label style="width:auto">
      <input type="checkbox" id="cb-update-all" /> Update all
    </label>
  </div>

  <button class="btn-reset" id="btn-reset" type="button">Clear stamps</button>
</div>

<script>
  // ─── Main canvas: 2D + layoutsubtree (proven to work) ───
  const canvas = document.querySelector("canvas[layoutsubtree]");
  const ctx = canvas.getContext("2d");
  const content = document.getElementById("content");

  function fitText() {
    const lines = content.querySelectorAll("span");
    const containerW = content.clientWidth;
    for (const line of lines) {
      line.style.fontSize = "10px";
      const natural = line.scrollWidth;
      if (natural > 0) line.style.fontSize = `${(containerW / natural) * 10}px`;
    }
  }
  fitText();
  new ResizeObserver(fitText).observe(content);

  // ─── OffscreenCanvas: WebGL2 for the shader (no DOM, no layoutsubtree) ───
  const offscreen = new OffscreenCanvas(300, 150);
  const gl = offscreen.getContext("webgl2", { preserveDrawingBuffer: true });

  const VS = `#version 300 es
in vec2 aPos;
void main() { gl_Position = vec4(aPos, 0.0, 1.0); }
`;

  const FS = `#version 300 es
precision highp float;

uniform sampler2D uSource;
uniform vec2 uResolution;
uniform int uStampCount;
// Per-stamp: xy=position, zw=radius
uniform vec4 uStampPosRad[64];
// Per-stamp: x=spread, y=grain, z=angle, w=bias
uniform vec4 uStampParams[64];
// Per-stamp samples (as float)
uniform float uStampSamples[64];

uniform vec2 uMouse;
uniform vec2 uCursorRadius;

out vec4 fragColor;

vec3 h3(vec3 p) {
  p = fract(p * vec3(0.1031, 0.1030, 0.0973));
  p += dot(p, p.yzx + 33.33);
  return p;
}

vec2 hash22(vec2 p) {
  vec3 o = h3(vec3(p.xyx));
  return fract(vec2((o.x + o.y) * o.z, (o.x + o.z) * o.y)) * 2.0 - 1.0;
}

vec2 valueNoise(vec2 p) {
  vec2 i = floor(p);
  vec2 f = fract(p);
  vec2 u = f * f * (3.0 - 2.0 * f);
  return mix(
    mix(hash22(i), hash22(i + vec2(1, 0)), u.x),
    mix(hash22(i + vec2(0, 1)), hash22(i + vec2(1, 1)), u.x),
    u.y
  );
}

void main() {
  vec2 pixel = vec2(gl_FragCoord.x, uResolution.y - gl_FragCoord.y);
  vec2 uv = pixel / uResolution;

  vec2 totalDisp = vec2(0.0);
  float maxStr = 0.0;
  float bestSamples = 6.0;

  for (int i = 0; i < 64; i++) {
    if (i >= uStampCount) break;
    vec2 center = uStampPosRad[i].xy;
    vec2 radius = uStampPosRad[i].zw;
    float spread = uStampParams[i].x;
    float grain  = uStampParams[i].y;
    float angle  = uStampParams[i].z;
    float bias   = uStampParams[i].w;

    vec2 norm = (pixel - center) / radius;
    float eDist = dot(norm, norm);
    if (eDist >= 1.0) continue;

    float str = pow(1.0 - sqrt(eDist), 2.0);

    float biasAmt = bias / 100.0;
    float biasRad = angle * 3.14159265 / 180.0;
    vec2 biasDir = vec2(cos(biasRad), sin(biasRad)) * biasAmt;

    vec2 nc = pixel / grain;
    vec2 nA = valueNoise(nc);
    vec2 nB = valueNoise(nc + 73.156);

    totalDisp += (nA * 0.7 + nB * 0.3 + biasDir) * spread * str;
    if (str > maxStr) {
      maxStr = str;
      bestSamples = uStampSamples[i];
    }
  }

  vec4 color;
  if (maxStr > 0.0) {
    color = vec4(0.0);
    float tw = 0.0;
    int samples = int(bestSamples);
    float invSm1 = samples > 1 ? 1.0 / float(samples - 1) : 1.0;

    for (int s = 0; s < 12; s++) {
      if (s >= samples) break;
      float t = float(s) * invSm1;
      vec2 sp = pixel + totalDisp * t;
      vec2 sUV = clamp(sp / uResolution, vec2(0), vec2(1));
      float w = 1.0 - t * 0.6;
      color += texture(uSource, sUV) * w;
      tw += w;
    }
    color /= tw;
  } else {
    color = texture(uSource, uv);
  }

  if (uMouse.x > -9000.0) {
    vec2 norm = (pixel - uMouse) / uCursorRadius;
    float d = length(norm);
    float fw = fwidth(d);
    float ring = smoothstep(1.0 - fw * 1.5, 1.0, d)
               * (1.0 - smoothstep(1.0, 1.0 + fw * 1.5, d));
    color = mix(color, vec4(0, 0, 0, 1), ring * 0.25);
  }

  fragColor = color;
}
`;

  function compile(type, src) {
    const s = gl.createShader(type);
    gl.shaderSource(s, src);
    gl.compileShader(s);
    if (!gl.getShaderParameter(s, gl.COMPILE_STATUS))
      console.error("Shader compile error:", gl.getShaderInfoLog(s));
    return s;
  }

  const prog = gl.createProgram();
  gl.attachShader(prog, compile(gl.VERTEX_SHADER, VS));
  gl.attachShader(prog, compile(gl.FRAGMENT_SHADER, FS));
  gl.linkProgram(prog);
  if (!gl.getProgramParameter(prog, gl.LINK_STATUS))
    console.error("Program link error:", gl.getProgramInfoLog(prog));

  const loc = {};
  for (const name of [
    "uSource", "uResolution", "uStampCount",
    "uStampPosRad", "uStampParams", "uStampSamples",
    "uMouse", "uCursorRadius",
  ]) loc[name] = gl.getUniformLocation(prog, name);

  const vao = gl.createVertexArray();
  gl.bindVertexArray(vao);
  const buf = gl.createBuffer();
  gl.bindBuffer(gl.ARRAY_BUFFER, buf);
  gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([-1,-1, 1,-1, -1,1, 1,1]), gl.STATIC_DRAW);
  const aPos = gl.getAttribLocation(prog, "aPos");
  gl.enableVertexAttribArray(aPos);
  gl.vertexAttribPointer(aPos, 2, gl.FLOAT, false, 0, 0);

  const tex = gl.createTexture();
  gl.bindTexture(gl.TEXTURE_2D, tex);
  gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_S, gl.CLAMP_TO_EDGE);
  gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_T, gl.CLAMP_TO_EDGE);
  gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MIN_FILTER, gl.LINEAR);
  gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MAG_FILTER, gl.LINEAR);

  // ─── State ───
  let mouseX = -9999, mouseY = -9999;
  let mode = "edit";
  const stamps = [];
  let pendingStamp = null;

  const P = {
    radiusX: 220, radiusY: 220,
    spread: 60, grain: 1.5, samples: 6,
    angle: 0, bias: 0,
  };

  const posRadBuf = new Float32Array(256);
  const paramsBuf = new Float32Array(256);
  const samplesBuf = new Float32Array(64);

  function stampEntry(s) {
    const dpr = devicePixelRatio;
    return {
      posRad: [s.x, s.y, s.radiusX * dpr, s.radiusY * dpr],
      params: [s.spread * dpr, s.grain, s.angle, s.bias],
      samples: s.samples,
    };
  }

  // ─── GL render on OffscreenCanvas ───
  function renderGL(w, h) {
    if (offscreen.width !== w || offscreen.height !== h) {
      offscreen.width = w;
      offscreen.height = h;
    }

    gl.bindTexture(gl.TEXTURE_2D, tex);
    gl.texImage2D(gl.TEXTURE_2D, 0, gl.RGBA, gl.RGBA, gl.UNSIGNED_BYTE, canvas);

    gl.viewport(0, 0, w, h);
    gl.useProgram(prog);
    gl.bindVertexArray(vao);

    gl.uniform1i(loc.uSource, 0);
    gl.uniform2f(loc.uResolution, w, h);

    const allStamps = [...stamps];
    if (mode === "edit" && mouseX > -9000) {
      allStamps.push({
        x: mouseX, y: mouseY,
        radiusX: P.radiusX, radiusY: P.radiusY,
        spread: P.spread, grain: P.grain, samples: P.samples,
        angle: P.angle, bias: P.bias,
      });
    }

    const count = Math.min(allStamps.length, 64);
    for (let i = 0; i < count; i++) {
      const e = stampEntry(allStamps[i]);
      posRadBuf.set(e.posRad, i * 4);
      paramsBuf.set(e.params, i * 4);
      samplesBuf[i] = e.samples;
    }
    gl.uniform4fv(loc.uStampPosRad, posRadBuf);
    gl.uniform4fv(loc.uStampParams, paramsBuf);
    gl.uniform1fv(loc.uStampSamples, samplesBuf);
    gl.uniform1i(loc.uStampCount, count);

    const dpr = devicePixelRatio;
    if (mode === "edit" && mouseX > -9000) {
      gl.uniform2f(loc.uMouse, mouseX, mouseY);
    } else {
      gl.uniform2f(loc.uMouse, -99999, -99999);
    }
    gl.uniform2f(loc.uCursorRadius, P.radiusX * dpr, P.radiusY * dpr);

    gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);
  }

  // ─── Pointer events ───
  canvas.addEventListener("pointermove", (e) => {
    const rect = canvas.getBoundingClientRect();
    mouseX = (e.clientX - rect.left) * devicePixelRatio;
    mouseY = (e.clientY - rect.top) * devicePixelRatio;
  });
  canvas.addEventListener("pointerleave", () => { mouseX = mouseY = -9999; });

  canvas.addEventListener("click", (e) => {
    if (mode !== "edit") return;
    const rect = canvas.getBoundingClientRect();
    pendingStamp = {
      x: (e.clientX - rect.left) * devicePixelRatio,
      y: (e.clientY - rect.top) * devicePixelRatio,
      radiusX: P.radiusX, radiusY: P.radiusY,
      spread: P.spread, grain: P.grain, samples: P.samples,
      angle: P.angle, bias: P.bias,
    };
  });

  // ─── Paint: 2D drawElementImage → GL shader on OffscreenCanvas → drawImage back ───
  canvas.onpaint = () => {
    const t0 = performance.now();
    const w = canvas.width, h = canvas.height;
    if (!w || !h) return;

    ctx.reset();
    ctx.clearRect(0, 0, w, h);

    try {
      const transform = ctx.drawElementImage(content, 0, 0, w, h);
      content.style.transform = transform.toString();
    } catch { return; }

    if (pendingStamp) {
      stamps.push(pendingStamp);
      pendingStamp = null;
    }

    const hasWork = stamps.length > 0 || (mode === "edit" && mouseX > -9000);
    if (hasWork) {
      renderGL(w, h);
      ctx.drawImage(offscreen, 0, 0);
    }

    console.log(`paint: ${(performance.now() - t0).toFixed(2)}ms`);
  };

  // ─── Resize ───
  new ResizeObserver(([entry]) => {
    const box = entry.devicePixelContentBoxSize[0];
    canvas.width = box.inlineSize;
    canvas.height = box.blockSize;
    canvas.requestPaint();
  }).observe(canvas, { box: "device-pixel-content-box" });

  (function tick() {
    canvas.requestPaint();
    requestAnimationFrame(tick);
  })();

  // ─── UI ───
  function wire(id, valId, prop, fmt) {
    const sl = document.getElementById(id);
    const vl = document.getElementById(valId);
    sl.value = P[prop];
    vl.textContent = fmt(P[prop]);
    sl.addEventListener("input", () => {
      P[prop] = parseFloat(sl.value);
      vl.textContent = fmt(P[prop]);
      syncAllStamps();
    });
  }

  wire("s-width",   "v-width",   "radiusX",  v => v);
  wire("s-height",  "v-height",  "radiusY",  v => v);

  (function wireSize() {
    const sl = document.getElementById("s-size");
    const vl = document.getElementById("v-size");
    const slW = document.getElementById("s-width");
    const vlW = document.getElementById("v-width");
    const slH = document.getElementById("s-height");
    const vlH = document.getElementById("v-height");
    sl.addEventListener("input", () => {
      const v = parseFloat(sl.value);
      P.radiusX = v;
      P.radiusY = v;
      vl.textContent = v;
      slW.value = v; vlW.textContent = v;
      slH.value = v; vlH.textContent = v;
      syncAllStamps();
    });
  })();
  wire("s-spread",  "v-spread",  "spread",   v => v);
  wire("s-grain",   "v-grain",   "grain",    v => v);
  wire("s-samples", "v-samples", "samples",  v => v);
  wire("s-angle",   "v-angle",   "angle",    v => v + "°");
  wire("s-bias",    "v-bias",    "bias",     v => v + "%");

  const cbUpdateAll = document.getElementById("cb-update-all");

  function syncAllStamps() {
    if (!cbUpdateAll.checked) return;
    for (const s of stamps) {
      s.radiusX = P.radiusX; s.radiusY = P.radiusY;
      s.spread = P.spread; s.grain = P.grain; s.samples = P.samples;
      s.angle = P.angle; s.bias = P.bias;
    }
  }

  document.getElementById("btn-reset").addEventListener("click", () => { stamps.length = 0; pendingStamp = null; });

  const btnEdit = document.getElementById("btn-edit");
  const btnView = document.getElementById("btn-view");
  function setMode(m) {
    mode = m;
    btnEdit.classList.toggle("active", m === "edit");
    btnView.classList.toggle("active", m === "view");
    canvas.style.cursor = m === "edit" ? "crosshair" : "default";
  }
  btnEdit.addEventListener("click", () => setMode("edit"));
  btnView.addEventListener("click", () => setMode("view"));

  // ─── Direction ring widget ───
  const dirCanvas = document.getElementById("dir-canvas");
  const dirCtx = dirCanvas.getContext("2d");

  function drawDirRing() {
    const s = 112, cx = s/2, cy = s/2, r = 42;
    dirCtx.clearRect(0, 0, s, s);
    dirCtx.beginPath(); dirCtx.arc(cx, cy, r, 0, Math.PI * 2);
    dirCtx.strokeStyle = "#cbd5e1"; dirCtx.lineWidth = 1.5; dirCtx.stroke();
    dirCtx.beginPath(); dirCtx.arc(cx, cy, 3, 0, Math.PI * 2);
    dirCtx.fillStyle = "#94a3b8"; dirCtx.fill();
    const len = (P.bias / 100) * r;
    if (len > 2) {
      const rad = P.angle * Math.PI / 180;
      const tx = cx + Math.cos(rad) * len, ty = cy + Math.sin(rad) * len;
      dirCtx.beginPath(); dirCtx.moveTo(cx, cy); dirCtx.lineTo(tx, ty);
      dirCtx.strokeStyle = "#1e293b"; dirCtx.lineWidth = 2; dirCtx.stroke();
      dirCtx.beginPath(); dirCtx.arc(tx, ty, 5, 0, Math.PI * 2);
      dirCtx.fillStyle = "#1e293b"; dirCtx.fill();
    }
  }
  drawDirRing();
  document.getElementById("s-angle").addEventListener("input", drawDirRing);
  document.getElementById("s-bias").addEventListener("input", drawDirRing);

  let dragging = false;
  dirCanvas.addEventListener("pointerdown", (e) => { dragging = true; dirCanvas.setPointerCapture(e.pointerId); updateDir(e); });
  dirCanvas.addEventListener("pointermove", (e) => { if (dragging) updateDir(e); });
  dirCanvas.addEventListener("pointerup", () => { dragging = false; });

  function updateDir(e) {
    const rect = dirCanvas.getBoundingClientRect();
    const dx = e.clientX - rect.left - rect.width/2;
    const dy = e.clientY - rect.top - rect.height/2;
    let a = Math.atan2(dy, dx) * 180 / Math.PI; if (a < 0) a += 360;
    P.angle = Math.round(a);
    P.bias = Math.round(Math.min(1, Math.hypot(dx, dy) / (42 * rect.width / 112)) * 100);
    document.getElementById("s-angle").value = P.angle;
    document.getElementById("v-angle").textContent = P.angle + "°";
    document.getElementById("s-bias").value = P.bias;
    document.getElementById("v-bias").textContent = P.bias + "%";
    drawDirRing();
    syncAllStamps();
  }
</script>
